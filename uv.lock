version = 1
revision = 3
requires-python = ">=3.13.0"

[manifest]
members = [
    "mars-core",
    "mars-framework-workspace",
    "services-api",
]

[[package]]
name = "mars-core"
version = "0.1.0"
source = { editable = "bindings/python" }

[[package]]
name = "mars-framework-workspace"
version = "0.0.1"
source = { virtual = "." }

[[package]]
name = "services-api"
version = "0.1.0"
source = { virtual = "services/api" }
